<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#05060a"/>
<title>NS Arena — Map Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cyan:#45f3ff;--purple:#a855f7;--danger:#ff4466;--good:#22c55e;
  --bg:#05060a;--panel:#04080e;--border:rgba(69,243,255,.13);
  --muted:#555;--text:#ddd;--cell:52px
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:ui-monospace,monospace;font-size:13px;touch-action:none}

/* ── Layout shells ── */
#app{display:flex;flex-direction:column;height:100%;max-height:100dvh}

/* ── Top bar ── */
#topbar{
  display:flex;align-items:center;gap:8px;padding:8px 12px;flex-shrink:0;
  background:rgba(4,8,14,.98);border-bottom:1px solid var(--border);
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none
}
#topbar::-webkit-scrollbar{display:none}
.logo{color:var(--cyan);font-weight:800;font-size:14px;white-space:nowrap;flex-shrink:0}
#mapName{
  background:rgba(69,243,255,.07);border:1px solid rgba(69,243,255,.2);
  color:var(--cyan);padding:5px 10px;border-radius:6px;
  font:inherit;font-size:13px;width:130px;min-width:80px;flex-shrink:0
}
.tsep{width:1px;height:26px;background:rgba(255,255,255,.1);flex-shrink:0}
.tbtn{
  display:flex;align-items:center;gap:5px;padding:5px 11px;
  border-radius:6px;cursor:pointer;font:inherit;font-size:12px;
  border:1px solid rgba(255,255,255,.12);background:transparent;
  color:#888;transition:.15s;white-space:nowrap;flex-shrink:0
}
.tbtn:active,.tbtn.active{background:rgba(69,243,255,.15);border-color:var(--cyan);color:var(--cyan)}
.tbtn.danger{border-color:rgba(255,68,102,.3);color:var(--danger)}
.tbtn.danger:active{background:rgba(255,68,102,.12)}
.tbtn.accent{border-color:rgba(168,85,247,.3);color:var(--purple)}
.tbtn.accent:active{background:rgba(168,85,247,.12)}
#saveStatus{color:rgba(69,243,255,.5);font-size:10px;white-space:nowrap;flex-shrink:0}

/* ── Main area ── */
#main{display:flex;flex:1;overflow:hidden}

/* ── Canvas area ── */
#canvasWrap{flex:1;position:relative;overflow:hidden;background:#030509;touch-action:none}
#c{display:block;touch-action:none}
#coordLabel{
  position:absolute;top:8px;left:8px;background:rgba(4,8,14,.75);
  border:1px solid var(--border);border-radius:4px;padding:2px 7px;
  font-size:10px;color:rgba(69,243,255,.6);pointer-events:none
}
#helpTip{
  position:absolute;bottom:120px;left:50%;transform:translateX(-50%);
  background:rgba(4,8,14,.85);border:1px solid var(--border);
  border-radius:8px;padding:6px 14px;font-size:11px;color:#666;
  pointer-events:none;white-space:nowrap;transition:opacity .4s
}

/* ── Bottom mobile toolbar ── */
#bottomBar{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 10px;background:rgba(4,8,14,.97);
  border-top:1px solid var(--border);flex-shrink:0
}
.mbtool{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 14px;border-radius:8px;cursor:pointer;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);
  color:#777;font:inherit;font-size:10px;transition:.15s;flex:1;max-width:90px
}
.mbtool .ico{font-size:20px;line-height:1}
.mbtool.active{background:rgba(69,243,255,.12);border-color:rgba(69,243,255,.35);color:var(--cyan)}
.mbtool:active{opacity:.7}

/* ── Object drawer (slides up) ── */
#drawer{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(4,8,14,.98);border-top:2px solid var(--border);
  border-radius:16px 16px 0 0;
  transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
  max-height:70dvh;display:flex;flex-direction:column
}
#drawer.open{transform:translateY(0)}
#drawerHandle{
  width:36px;height:4px;background:rgba(69,243,255,.3);border-radius:2px;
  margin:10px auto 6px;flex-shrink:0;cursor:pointer
}
#drawerTitle{
  text-align:center;color:var(--cyan);font-weight:700;font-size:11px;
  letter-spacing:.12em;text-transform:uppercase;padding-bottom:8px;flex-shrink:0
}
#catScroll{
  display:flex;gap:6px;padding:0 12px 8px;overflow-x:auto;flex-shrink:0;scrollbar-width:none
}
#catScroll::-webkit-scrollbar{display:none}
.cat-chip{
  display:flex;align-items:center;gap:5px;padding:5px 12px;
  border-radius:20px;cursor:pointer;white-space:nowrap;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);
  color:#777;font:inherit;font-size:11px;flex-shrink:0;transition:.15s
}
.cat-chip.active{background:rgba(69,243,255,.12);border-color:rgba(69,243,255,.35);color:var(--cyan)}
#objGrid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:8px;padding:8px 12px 20px;overflow-y:auto;flex:1;scrollbar-width:thin;
  scrollbar-color:rgba(69,243,255,.2) transparent
}
.obj-card{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 6px;border-radius:10px;cursor:pointer;
  border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);
  color:#bbb;font:inherit;font-size:10px;text-align:center;
  transition:.15s;position:relative
}
.obj-card:active{transform:scale(.94)}
.obj-card.selected{background:rgba(69,243,255,.12);border-color:rgba(69,243,255,.4);color:var(--cyan)}
.obj-card .emoji{font-size:26px;line-height:1}
.obj-card .name{font-weight:600;font-size:10px;line-height:1.2}
.obj-card .size{color:var(--muted);font-size:9px}

/* ── Properties panel (slides from right) ── */
#propPanel{
  position:fixed;top:0;right:0;bottom:0;z-index:200;width:220px;
  background:rgba(4,8,14,.98);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;padding:16px;gap:12px;overflow-y:auto
}
#propPanel.open{transform:translateX(0)}
.prop-header{display:flex;justify-content:space-between;align-items:center}
.prop-title{color:var(--cyan);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase}
#closeProp{
  background:transparent;border:1px solid rgba(255,255,255,.12);color:#888;
  border-radius:4px;cursor:pointer;font:inherit;font-size:11px;padding:3px 8px
}
.prop-card{
  background:rgba(69,243,255,.05);border:1px solid rgba(69,243,255,.12);
  border-radius:8px;padding:14px;text-align:center
}
.prop-emoji{font-size:38px;line-height:1}
.prop-name{color:var(--cyan);font-weight:700;margin-top:6px}
.prop-cat{color:var(--muted);font-size:10px;margin-top:2px;text-transform:capitalize}
.prop-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.prop-key{color:var(--muted);font-size:11px}
.prop-val{color:#e0e0e0;font-weight:600;font-size:11px}
.act-btn{
  width:100%;padding:10px;border-radius:8px;cursor:pointer;font:inherit;
  font-size:12px;font-weight:700;transition:.15s;border:1px solid
}
.act-btn.del{background:rgba(255,50,50,.08);border-color:rgba(255,50,50,.4);color:var(--danger)}
.act-btn.del:active{background:rgba(255,50,50,.2)}

/* ── Map info overlay ── */
#mapInfo{
  position:absolute;top:8px;right:8px;
  background:rgba(4,8,14,.8);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;font-size:10px;pointer-events:none
}
.mi-row{display:flex;justify-content:space-between;gap:16px}
.mi-key{color:var(--muted)}
.mi-val{color:var(--cyan);font-weight:700}

/* ── Minimap ── */
#minimap{
  position:absolute;bottom:8px;right:8px;
  width:130px;height:80px;pointer-events:none;
  border:1px solid rgba(69,243,255,.25);border-radius:6px;
  background:rgba(4,8,14,.85);overflow:hidden
}
#minimapCanvas{width:100%;height:100%}

/* ── Zoom controls ── */
#zoomCtrl{
  position:absolute;bottom:96px;right:8px;
  display:flex;flex-direction:column;gap:4px
}
.zoom-btn{
  width:36px;height:36px;border-radius:8px;cursor:pointer;
  background:rgba(4,8,14,.85);border:1px solid var(--border);
  color:var(--cyan);font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center
}

/* ── Toast ── */
#toast{
  position:fixed;top:60px;left:50%;transform:translateX(-50%);
  background:rgba(4,8,14,.95);border:1px solid rgba(69,243,255,.3);
  border-radius:8px;padding:8px 18px;font-size:12px;color:var(--cyan);
  pointer-events:none;opacity:0;transition:opacity .3s;z-index:999;
  white-space:nowrap
}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <span class="logo">⚔ NS MAP EDITOR</span>
    <input id="mapName" value="My Arena Map" placeholder="Map name"/>
    <div class="tsep"></div>
    <button class="tbtn" onclick="undo()">↩</button>
    <button class="tbtn" onclick="redo()">↪</button>
    <div class="tsep"></div>
    <button class="tbtn" onclick="saveMap()">💾 Save</button>
    <button class="tbtn" onclick="loadMap()">📂 Load</button>
    <button class="tbtn accent" onclick="exportMap()">⬇ Export</button>
    <button class="tbtn" onclick="importMap()">⬆ Import</button>
    <button class="tbtn danger" onclick="clearMap()">🗑 Clear</button>
    <span id="saveStatus"></span>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="canvasWrap">
      <canvas id="c"></canvas>
      <div id="coordLabel">—</div>
      <div id="mapInfo">
        <div class="mi-row"><span class="mi-key">Objects</span><span class="mi-val" id="infoObjs">0</span></div>
        <div class="mi-row" style="margin-top:3px"><span class="mi-key">Size</span><span class="mi-val" id="infoSize">50×40</span></div>
      </div>
      <div id="minimap"><canvas id="minimapCanvas"></canvas></div>
      <div id="zoomCtrl">
        <button class="zoom-btn" onclick="zoomBy(1.2)">+</button>
        <button class="zoom-btn" onclick="zoomBy(0.83)">−</button>
        <button class="zoom-btn" style="font-size:12px" onclick="resetView()">⌂</button>
      </div>
      <div id="helpTip">Tap to place · Two-finger pan · Pinch to zoom</div>
    </div>
  </div>

  <!-- Bottom tool bar -->
  <div id="bottomBar">
    <button class="mbtool active" id="toolPlace" onclick="setTool('place')">
      <span class="ico">✏️</span><span>Place</span>
    </button>
    <button class="mbtool" id="toolSelect" onclick="setTool('select')">
      <span class="ico">👆</span><span>Select</span>
    </button>
    <button class="mbtool" id="toolErase" onclick="setTool('erase')">
      <span class="ico">🧹</span><span>Erase</span>
    </button>
    <button class="mbtool" id="toolObjects" onclick="toggleDrawer()">
      <span class="ico">📦</span><span>Objects</span>
    </button>
    <button class="mbtool" onclick="toggleGrid()">
      <span class="ico" id="gridIco">⊞</span><span>Grid</span>
    </button>
  </div>
</div>

<!-- Object drawer -->
<div id="drawer">
  <div id="drawerHandle" onclick="closeDrawer()"></div>
  <div id="drawerTitle">Choose Object</div>
  <div id="catScroll"></div>
  <div id="objGrid"></div>
</div>

<!-- Properties panel -->
<div id="propPanel">
  <div class="prop-header">
    <span class="prop-title">Properties</span>
    <button id="closeProp" onclick="closePropPanel()">✕ Close</button>
  </div>
  <div id="propContent"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Object definitions ────────────────────────────────────────────────────────
const DEFS = {
  // 🌿 Nature
  tree:    {e:"🌳",l:"Tree",        c:"nature",    w:2,h:2,col:"#1a4a1a"},
  pine:    {e:"🌲",l:"Pine",        c:"nature",    w:2,h:2,col:"#0d3b0d"},
  palm:    {e:"🌴",l:"Palm",        c:"nature",    w:2,h:3,col:"#1a5a1a"},
  bush:    {e:"🌿",l:"Bush",        c:"nature",    w:1,h:1,col:"#2a6a1a"},
  grass:   {e:"🌱",l:"Grass",       c:"nature",    w:1,h:1,col:"#3a7a2a"},
  flower:  {e:"🌸",l:"Flower",      c:"nature",    w:1,h:1,col:"#ff88bb"},
  sunflow: {e:"🌻",l:"Sunflower",   c:"nature",    w:1,h:1,col:"#ffcc00"},
  rock:    {e:"🪨",l:"Rock",        c:"nature",    w:1,h:1,col:"#666"},
  bigrock: {e:"🪨",l:"Big Rock",    c:"nature",    w:2,h:2,col:"#555"},
  water:   {e:"💧",l:"Water",       c:"nature",    w:2,h:2,col:"#1a4aaa"},
  pond:    {e:"🌊",l:"Pond",        c:"nature",    w:3,h:3,col:"#1a3aaa"},
  mushroom:{e:"🍄",l:"Mushroom",    c:"nature",    w:1,h:1,col:"#aa3a1a"},

  // 🏠 Buildings
  house:   {e:"🏠",l:"House",       c:"buildings", w:4,h:4,col:"#7a3d1a"},
  house_s: {e:"🏡",l:"Small House", c:"buildings", w:3,h:3,col:"#8a4d2a"},
  shed:    {e:"🏚",l:"Shed",        c:"buildings", w:3,h:3,col:"#8a5030"},
  tower:   {e:"🗼",l:"Tower",       c:"buildings", w:2,h:4,col:"#555"},
  wall_h:  {e:"⬛",l:"Wall ─",     c:"buildings", w:3,h:1,col:"#444"},
  wall_v:  {e:"⬛",l:"Wall │",     c:"buildings", w:1,h:3,col:"#444"},
  wall_c:  {e:"⬛",l:"Corner",      c:"buildings", w:1,h:1,col:"#444"},
  door:    {e:"🚪",l:"Door",        c:"buildings", w:1,h:2,col:"#8b4513"},
  window:  {e:"🪟",l:"Window",      c:"buildings", w:1,h:1,col:"#88aaff"},
  fence_h: {e:"🪵",l:"Fence ─",    c:"buildings", w:3,h:1,col:"#c8a060"},
  fence_v: {e:"🪵",l:"Fence │",    c:"buildings", w:1,h:3,col:"#c8a060"},
  gate:    {e:"🚧",l:"Gate",        c:"buildings", w:2,h:1,col:"#c8a060"},
  ruin:    {e:"🏛",l:"Ruin",        c:"buildings", w:4,h:4,col:"#666"},

  // 🪑 Furniture
  table:   {e:"🪑",l:"Table",       c:"furniture", w:2,h:1,col:"#8b4513"},
  chair:   {e:"💺",l:"Chair",       c:"furniture", w:1,h:1,col:"#6b3510"},
  sofa:    {e:"🛋",l:"Sofa",        c:"furniture", w:3,h:1,col:"#5568aa"},
  bed:     {e:"🛏",l:"Bed",         c:"furniture", w:2,h:2,col:"#4488aa"},
  shelf:   {e:"📚",l:"Shelf",       c:"furniture", w:2,h:1,col:"#8b5030"},
  barrel:  {e:"🪣",l:"Barrel",      c:"furniture", w:1,h:1,col:"#a06030"},
  barrels: {e:"🪣",l:"Barrels",     c:"furniture", w:2,h:1,col:"#a06030"},
  crate:   {e:"📦",l:"Crate",       c:"furniture", w:1,h:1,col:"#c8a060"},
  crates:  {e:"📦",l:"Crate Stack", c:"furniture", w:2,h:2,col:"#c8a060"},
  lamp:    {e:"💡",l:"Lamp",        c:"furniture", w:1,h:1,col:"#ffdd44"},
  campfire:{e:"🔥",l:"Campfire",    c:"furniture", w:1,h:1,col:"#ff6600"},
  chest:   {e:"🧰",l:"Chest",       c:"furniture", w:1,h:1,col:"#cc9900"},
  pot:     {e:"🪴",l:"Plant Pot",   c:"furniture", w:1,h:1,col:"#3a6a1a"},

  // ⚔️ Combat
  barrier: {e:"🛡",l:"Barrier ─",  c:"combat",    w:2,h:1,col:"#333"},
  barrier_v:{e:"🛡",l:"Barrier │", c:"combat",    w:1,h:2,col:"#333"},
  sandbag: {e:"⚫",l:"Sandbag",     c:"combat",    w:1,h:1,col:"#c8a040"},
  sandbags:{e:"⚫",l:"Sandbags",    c:"combat",    w:2,h:1,col:"#c8a040"},
  cover:   {e:"🔲",l:"Cover",       c:"combat",    w:2,h:2,col:"#444"},
  spawn_r: {e:"🔴",l:"Red Spawn",   c:"combat",    w:1,h:1,col:"#cc2222"},
  spawn_b: {e:"🔵",l:"Blue Spawn",  c:"combat",    w:1,h:1,col:"#2244cc"},
  spawn:   {e:"⭐",l:"Spawn",       c:"combat",    w:1,h:1,col:"#ffdd00"},
  health:  {e:"❤️", l:"Health Pack",c:"combat",    w:1,h:1,col:"#ff4444"},
  ammo:    {e:"🔫",l:"Ammo Box",    c:"combat",    w:1,h:1,col:"#888"},
  trap:    {e:"⚡",l:"Trap",        c:"combat",    w:1,h:1,col:"#ffcc00"},
  turret:  {e:"🔭",l:"Turret",      c:"combat",    w:1,h:1,col:"#666"},

  // 🗺 Terrain
  road_h:  {e:"🛣",l:"Road ─",     c:"terrain",   w:4,h:1,col:"#444"},
  road_v:  {e:"🛤",l:"Road │",     c:"terrain",   w:1,h:4,col:"#444"},
  path:    {e:"⬜",l:"Path",        c:"terrain",   w:1,h:1,col:"#aaa"},
  bridge:  {e:"🌉",l:"Bridge",      c:"terrain",   w:4,h:2,col:"#777"},
  stairs:  {e:"🪜",l:"Stairs",      c:"terrain",   w:2,h:1,col:"#999"},
  pit:     {e:"⬛",l:"Pit",         c:"terrain",   w:2,h:2,col:"#0a0a0a"},
  sand:    {e:"🏖",l:"Sand",        c:"terrain",   w:2,h:2,col:"#e8d090"},
  lava:    {e:"🌋",l:"Lava",        c:"terrain",   w:2,h:2,col:"#ff4400"},
  ice:     {e:"🧊",l:"Ice",         c:"terrain",   w:2,h:2,col:"#88ccff"},
  crater:  {e:"💣",l:"Crater",      c:"terrain",   w:3,h:3,col:"#3a2a1a"},
  snow:    {e:"❄️",l:"Snow",        c:"terrain",   w:2,h:2,col:"#ccddff"},
};

const CATS = [
  {id:"nature",    ico:"🌿", label:"Nature"},
  {id:"buildings", ico:"🏠", label:"Buildings"},
  {id:"furniture", ico:"🪑", label:"Furniture"},
  {id:"combat",    ico:"⚔️",  label:"Combat"},
  {id:"terrain",   ico:"🗺", label:"Terrain"},
];

// ── State ─────────────────────────────────────────────────────────────────────
let objects=[], selectedId=null, placingType="tree";
let tool="place", showGrid=true, currentCat="nature";
let camera={x:40,y:30,zoom:1};
let cursorGrid=null, history=[], future=[];
let mapW=50, mapH=40, nextId=1;
const CELL=52;

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");
const mmCanvas=document.getElementById("minimapCanvas");
const mmCtx=mmCanvas.getContext("2d");

function resize(){
  const wrap=document.getElementById("canvasWrap");
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  mmCanvas.width=130; mmCanvas.height=80;
}
resize();
window.addEventListener("resize",resize);

// ── Build sidebar UI ──────────────────────────────────────────────────────────
function buildDrawer(){
  // Category chips
  const cs=document.getElementById("catScroll");
  cs.innerHTML=CATS.map(cat=>
    `<button class="cat-chip${cat.id===currentCat?" active":""}" onclick="setCat('${cat.id}')">
      ${cat.ico} ${cat.label}
    </button>`
  ).join("");

  // Object grid
  const og=document.getElementById("objGrid");
  og.innerHTML=Object.entries(DEFS)
    .filter(([,d])=>d.c===currentCat)
    .map(([type,d])=>
      `<button class="obj-card${type===placingType&&tool==="place"?" selected":""}"
        onclick="selectObjType('${type}')">
        <span class="emoji">${d.e}</span>
        <span class="name">${d.l}</span>
        <span class="size">${d.w}×${d.h}</span>
      </button>`
    ).join("");
}

function setCat(cat){ currentCat=cat; buildDrawer(); }

function selectObjType(type){
  placingType=type; tool="place";
  updateToolBtns(); buildDrawer();
  closeDrawer();
  showToast("Placing: "+DEFS[type].l);
}

// ── Drawer ────────────────────────────────────────────────────────────────────
let drawerOpen=false;
function toggleDrawer(){ drawerOpen?closeDrawer():openDrawer(); }
function openDrawer(){
  drawerOpen=true;
  buildDrawer();
  document.getElementById("drawer").classList.add("open");
}
function closeDrawer(){
  drawerOpen=false;
  document.getElementById("drawer").classList.remove("open");
}

// ── Tool management ───────────────────────────────────────────────────────────
function setTool(t){
  tool=t;
  if(t!=="select"){ selectedId=null; closePropPanel(); }
  updateToolBtns();
  if(t==="place") openDrawer();
}
function updateToolBtns(){
  ["Place","Select","Erase"].forEach(name=>{
    const el=document.getElementById("tool"+name);
    if(el) el.classList.toggle("active", tool===name.toLowerCase());
  });
}
function toggleGrid(){
  showGrid=!showGrid;
  document.getElementById("gridIco").textContent=showGrid?"⊞":"▫";
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function worldToScreen(gx,gy){
  const cs=CELL*camera.zoom;
  return{x:camera.x+gx*cs, y:camera.y+gy*cs};
}
function screenToGrid(sx,sy){
  const rect=canvas.getBoundingClientRect();
  const cs=CELL*camera.zoom;
  return{
    x:Math.floor((sx-rect.left-camera.x)/cs),
    y:Math.floor((sy-rect.top -camera.y)/cs)
  };
}
function canPlace(gx,gy,type,skipId=null){
  const d=DEFS[type]; if(!d) return false;
  if(gx<0||gy<0||gx+d.w>mapW||gy+d.h>mapH) return false;
  return !objects.some(o=>{
    if(o.id===skipId) return false;
    const od=DEFS[o.type]; if(!od) return false;
    return !(gx>=o.x+od.w||gx+d.w<=o.x||gy>=o.y+od.h||gy+d.h<=o.y);
  });
}
function pushHistory(){
  history.push(JSON.parse(JSON.stringify(objects)));
  if(history.length>60) history.shift();
  future=[];
}
function updateInfo(){
  document.getElementById("infoObjs").textContent=objects.length;
  document.getElementById("infoSize").textContent=`${mapW}×${mapH}`;
}
function showToast(msg,col){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.color=col||"var(--cyan)";
  t.classList.add("show");
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>t.classList.remove("show"),1800);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function placeAt(gx,gy){
  if(!canPlace(gx,gy,placingType)) return;
  pushHistory();
  objects.push({id:nextId++,type:placingType,x:gx,y:gy});
  updateInfo();
}
function eraseAt(gx,gy){
  const rem=objects.filter(o=>{
    const od=DEFS[o.type]; if(!od) return false;
    return gx>=o.x&&gx<o.x+od.w&&gy>=o.y&&gy<o.y+od.h;
  });
  if(!rem.length) return;
  pushHistory();
  const ids=new Set(rem.map(o=>o.id));
  objects=objects.filter(o=>!ids.has(o.id));
  if(ids.has(selectedId)){selectedId=null;closePropPanel();}
  updateInfo();
}
function selectAt(gx,gy){
  const found=[...objects].reverse().find(o=>{
    const od=DEFS[o.type]; if(!od) return false;
    return gx>=o.x&&gx<o.x+od.w&&gy>=o.y&&gy<o.y+od.h;
  });
  selectedId=found?found.id:null;
  if(found) openPropPanel(); else closePropPanel();
}
function deleteSelected(){
  if(!selectedId) return;
  pushHistory();
  objects=objects.filter(o=>o.id!==selectedId);
  selectedId=null; closePropPanel(); updateInfo();
  showToast("Deleted","var(--danger)");
}
function undo(){
  if(!history.length) return;
  future.push(JSON.parse(JSON.stringify(objects)));
  objects=history.pop();
  selectedId=null; closePropPanel(); updateInfo();
  showToast("Undo ↩");
}
function redo(){
  if(!future.length) return;
  history.push(JSON.parse(JSON.stringify(objects)));
  objects=future.pop();
  updateInfo(); showToast("Redo ↪");
}
function clearMap(){
  if(!confirm("Clear all objects?")) return;
  pushHistory(); objects=[];
  selectedId=null; closePropPanel(); updateInfo();
  showToast("Cleared","var(--danger)");
}
function zoomBy(factor){
  const W=canvas.width,H=canvas.height;
  const mx=W/2,my=H/2,old=camera.zoom;
  camera.zoom=Math.max(0.2,Math.min(5,old*factor));
  camera.x=mx-(mx-camera.x)*(camera.zoom/old);
  camera.y=my-(my-camera.y)*(camera.zoom/old);
}
function resetView(){
  camera={x:40,y:30,zoom:1};
}

// ── Properties panel ──────────────────────────────────────────────────────────
function openPropPanel(){
  const obj=objects.find(o=>o.id===selectedId);
  const def=obj?DEFS[obj.type]:null;
  if(!obj||!def) return;
  document.getElementById("propContent").innerHTML=`
    <div class="prop-card">
      <div class="prop-emoji">${def.e}</div>
      <div class="prop-name">${def.l}</div>
      <div class="prop-cat">${def.c}</div>
    </div>
    <div class="prop-row"><span class="prop-key">Position</span><span class="prop-val">X:${obj.x}  Y:${obj.y}</span></div>
    <div class="prop-row"><span class="prop-key">Size</span><span class="prop-val">${def.w}×${def.h} cells</span></div>
    <div class="prop-row"><span class="prop-key">ID</span><span class="prop-val">#${obj.id}</span></div>
    <button class="act-btn del" onclick="deleteSelected()">🗑 Delete Object</button>
  `;
  document.getElementById("propPanel").classList.add("open");
}
function closePropPanel(){
  document.getElementById("propPanel").classList.remove("open");
}

// ── Save / Load / Export ──────────────────────────────────────────────────────
function saveMap(){
  const name=document.getElementById("mapName").value.trim()||"My Map";
  const data={name,version:"1.2.1",width:mapW,height:mapH,objects,savedAt:new Date().toISOString()};
  localStorage.setItem("ns_map_"+name.replace(/\s+/g,"_"),JSON.stringify(data));
  localStorage.setItem("ns_map_last",name.replace(/\s+/g,"_"));
  const el=document.getElementById("saveStatus");
  el.textContent="✓ "+new Date().toLocaleTimeString();
  setTimeout(()=>el.textContent="",3000);
  showToast("💾 Map saved!");
}
function loadMap(){
  const key=localStorage.getItem("ns_map_last");
  if(!key) return showToast("No saved map found","var(--danger)");
  const raw=localStorage.getItem("ns_map_"+key);
  if(!raw) return showToast("Map not found","var(--danger)");
  const d=JSON.parse(raw);
  objects=d.objects||[]; mapW=d.width||50; mapH=d.height||40;
  nextId=Math.max(1,...objects.map(o=>o.id+1),1);
  document.getElementById("mapName").value=d.name||"Loaded";
  selectedId=null; closePropPanel(); updateInfo();
  showToast("📂 Map loaded!");
}
function exportMap(){
  const name=document.getElementById("mapName").value.trim()||"map";
  const data={name,version:"1.2.1",width:mapW,height:mapH,objects,exportedAt:new Date().toISOString()};
  const a=document.createElement("a");
  a.href="data:application/json,"+encodeURIComponent(JSON.stringify(data,null,2));
  a.download=name.replace(/\s+/g,"_")+".json"; a.click();
  showToast("⬇ Exported!");
}
function importMap(){
  const inp=document.createElement("input");
  inp.type="file"; inp.accept=".json";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        objects=d.objects||[]; mapW=d.width||50; mapH=d.height||40;
        nextId=Math.max(1,...objects.map(o=>o.id+1),1);
        document.getElementById("mapName").value=d.name||"Imported";
        selectedId=null; closePropPanel(); updateInfo();
        showToast("⬆ Map imported!");
      }catch{showToast("Invalid file","var(--danger)");}
    };
    r.readAsText(f);
  };
  inp.click();
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function rRect(c,x,y,w,h,r){
  if(c.roundRect){c.roundRect(x,y,w,h,r);return;}
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);
}

function drawFrame(){
  const W=canvas.width,H=canvas.height;
  const cs=CELL*camera.zoom;
  const mx=camera.x,my=camera.y,mw=mapW*cs,mh=mapH*cs;

  // Background
  ctx.fillStyle="#030509"; ctx.fillRect(0,0,W,H);

  // Map floor with subtle pattern
  ctx.fillStyle="#0a140a"; ctx.fillRect(mx,my,mw,mh);

  // Grid
  if(showGrid){
    ctx.lineWidth=0.5; ctx.strokeStyle="rgba(69,243,255,0.055)";
    ctx.beginPath();
    for(let gx=0;gx<=mapW;gx++){const px=mx+gx*cs;if(px<-1||px>W+1)continue;ctx.moveTo(px,my);ctx.lineTo(px,my+mh);}
    for(let gy=0;gy<=mapH;gy++){const py=my+gy*cs;if(py<-1||py>H+1)continue;ctx.moveTo(mx,py);ctx.lineTo(mx+mw,py);}
    ctx.stroke();
    ctx.lineWidth=1; ctx.strokeStyle="rgba(69,243,255,0.13)";
    ctx.beginPath();
    for(let gx=0;gx<=mapW;gx+=5){const px=mx+gx*cs;ctx.moveTo(px,my);ctx.lineTo(px,my+mh);}
    for(let gy=0;gy<=mapH;gy+=5){const py=my+gy*cs;ctx.moveTo(mx,py);ctx.lineTo(mx+mw,py);}
    ctx.stroke();
  }

  // Map border glow
  ctx.shadowColor="rgba(69,243,255,0.4)"; ctx.shadowBlur=8;
  ctx.strokeStyle="rgba(69,243,255,0.5)"; ctx.lineWidth=2;
  ctx.strokeRect(mx,my,mw,mh);
  ctx.shadowBlur=0;

  // Objects
  const sorted=[...objects].sort((a,b)=>(a.y-b.y)||(a.x-b.x));
  for(const obj of sorted){
    const d=DEFS[obj.type]; if(!d) continue;
    const px=mx+obj.x*cs,py=my+obj.y*cs,pw=d.w*cs,ph=d.h*cs;
    const isSel=obj.id===selectedId;

    ctx.fillStyle=d.col+(isSel?"95":"40");
    ctx.beginPath(); rRect(ctx,px+1,py+1,pw-2,ph-2,5); ctx.fill();

    if(isSel){
      ctx.strokeStyle="#45f3ff"; ctx.lineWidth=2; ctx.setLineDash([]);
      ctx.shadowColor="rgba(69,243,255,0.6)"; ctx.shadowBlur=10;
      ctx.strokeRect(px+1,py+1,pw-2,ph-2);
      ctx.shadowBlur=0;
      // Corner dots
      ctx.fillStyle="#45f3ff";
      [[px,py],[px+pw,py],[px,py+ph],[px+pw,py+ph]].forEach(([hx,hy])=>{
        ctx.beginPath(); ctx.arc(hx,hy,4,0,Math.PI*2); ctx.fill();
      });
    }

    const esz=Math.max(12,Math.min(pw,ph)*0.62);
    ctx.font=`${esz}px serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle="white";
    ctx.fillText(d.e,px+pw/2,py+ph/2);
  }

  // Place preview
  if(cursorGrid&&tool==="place"&&placingType){
    const d=DEFS[placingType]; if(d){
      const ok=canPlace(cursorGrid.x,cursorGrid.y,placingType);
      const px=mx+cursorGrid.x*cs,py=my+cursorGrid.y*cs,pw=d.w*cs,ph=d.h*cs;
      ctx.fillStyle=ok?"rgba(69,243,255,0.12)":"rgba(255,50,50,0.12)";
      ctx.fillRect(px,py,pw,ph);
      ctx.strokeStyle=ok?"rgba(69,243,255,0.75)":"rgba(255,50,50,0.75)";
      ctx.lineWidth=2; ctx.setLineDash([5,4]);
      ctx.strokeRect(px+1,py+1,pw-2,ph-2); ctx.setLineDash([]);
      ctx.globalAlpha=0.7;
      ctx.font=`${Math.max(12,Math.min(pw,ph)*0.6)}px serif`;
      ctx.textAlign="center"; ctx.textBaseline="middle";
      ctx.fillText(d.e,px+pw/2,py+ph/2);
      ctx.globalAlpha=1;
    }
  }

  // Erase cursor
  if(cursorGrid&&tool==="erase"){
    const px=mx+cursorGrid.x*cs,py=my+cursorGrid.y*cs;
    ctx.fillStyle="rgba(255,50,50,0.15)"; ctx.fillRect(px,py,cs,cs);
    ctx.strokeStyle="rgba(255,50,50,0.8)"; ctx.lineWidth=2;
    ctx.setLineDash([4,4]); ctx.strokeRect(px,py,cs,cs); ctx.setLineDash([]);
  }

  // Coord label
  if(cursorGrid&&cursorGrid.x>=0&&cursorGrid.x<mapW&&cursorGrid.y>=0&&cursorGrid.y<mapH){
    document.getElementById("coordLabel").textContent=`${cursorGrid.x}, ${cursorGrid.y}`;
  }

  // Minimap
  drawMinimap();
  requestAnimationFrame(drawFrame);
}

function drawMinimap(){
  const W=130,H=80;
  mmCtx.fillStyle="#03050a"; mmCtx.fillRect(0,0,W,H);
  mmCtx.fillStyle="#0a140a"; mmCtx.fillRect(0,0,W,H);
  const sx=W/mapW,sy=H/mapH;
  for(const obj of objects){
    const d=DEFS[obj.type]; if(!d) continue;
    mmCtx.fillStyle=d.col;
    mmCtx.fillRect(obj.x*sx,obj.y*sy,Math.max(2,d.w*sx),Math.max(2,d.h*sy));
  }
  if(selectedId){
    const obj=objects.find(o=>o.id===selectedId);
    if(obj){const d=DEFS[obj.type];if(d){mmCtx.strokeStyle="#45f3ff";mmCtx.lineWidth=1;mmCtx.strokeRect(obj.x*sx,obj.y*sy,d.w*sx,d.h*sy);}}
  }
  // Viewport
  const cs=CELL*camera.zoom;
  const vpX=(-camera.x/cs)*sx,vpY=(-camera.y/cs)*sy;
  const vpW=(canvas.width/cs)*sx,vpH=(canvas.height/cs)*sy;
  mmCtx.strokeStyle="rgba(69,243,255,0.55)"; mmCtx.lineWidth=1;
  mmCtx.strokeRect(Math.max(0,vpX),Math.max(0,vpY),Math.min(W,vpW),Math.min(H,vpH));
  mmCtx.fillStyle="rgba(69,243,255,0.4)"; mmCtx.font="8px monospace";
  mmCtx.textAlign="left"; mmCtx.textBaseline="bottom";
  mmCtx.fillText(`${objects.length} objs`,2,H-2);
}

// ── Input: Mouse ──────────────────────────────────────────────────────────────
let mouseDown=false,panning=false,panSX=0,panSY=0,lastCX=0,lastCY=0;
const helpTip=document.getElementById("helpTip");
let helpHidden=false;
function hideHelp(){if(!helpHidden){helpHidden=true;helpTip.style.opacity="0";}}

canvas.addEventListener("mousemove",e=>{
  cursorGrid=screenToGrid(e.clientX,e.clientY);
  if(panning){camera.x=lastCX+(e.clientX-panSX);camera.y=lastCY+(e.clientY-panSY);return;}
  if(mouseDown){
    if(tool==="place") placeAt(cursorGrid.x,cursorGrid.y);
    if(tool==="erase") eraseAt(cursorGrid.x,cursorGrid.y);
  }
});
canvas.addEventListener("mousedown",e=>{
  hideHelp(); closeDrawer();
  if(e.button===1||e.button===2){panning=true;panSX=e.clientX;panSY=e.clientY;lastCX=camera.x;lastCY=camera.y;e.preventDefault();return;}
  mouseDown=true;
  const g=screenToGrid(e.clientX,e.clientY);
  if(tool==="place") placeAt(g.x,g.y);
  else if(tool==="erase") eraseAt(g.x,g.y);
  else if(tool==="select") selectAt(g.x,g.y);
});
window.addEventListener("mouseup",()=>{mouseDown=false;panning=false;});
canvas.addEventListener("mouseleave",()=>{cursorGrid=null;mouseDown=false;});
canvas.addEventListener("contextmenu",e=>e.preventDefault());
canvas.addEventListener("wheel",e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const old=camera.zoom,f=e.deltaY>0?0.88:1.12;
  camera.zoom=Math.max(0.2,Math.min(5,old*f));
  camera.x=mx-(mx-camera.x)*(camera.zoom/old);
  camera.y=my-(my-camera.y)*(camera.zoom/old);
},{passive:false});

// ── Input: Touch ──────────────────────────────────────────────────────────────
let touches={}, lastPinchDist=0, panTouchId=null, panTStart=null;

canvas.addEventListener("touchstart",e=>{
  e.preventDefault(); hideHelp(); closeDrawer();
  for(const t of e.changedTouches) touches[t.identifier]=t;

  if(e.touches.length===2){
    panTouchId=null;
    const [a,b]=Array.from(e.touches);
    lastPinchDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    panTStart={
      x:(a.clientX+b.clientX)/2,y:(a.clientY+b.clientY)/2,
      cx:camera.x,cy:camera.y
    };
    return;
  }

  if(e.touches.length===1){
    const t=e.touches[0];
    panTouchId=t.identifier;
    panTStart={x:t.clientX,y:t.clientY,cx:camera.x,cy:camera.y,moved:false};
    cursorGrid=screenToGrid(t.clientX,t.clientY);
  }
},{passive:false});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();
  for(const t of e.changedTouches) touches[t.identifier]=t;

  // Pinch/two-finger pan
  if(e.touches.length===2&&panTStart){
    const [a,b]=Array.from(e.touches);
    const dist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    const mx=(a.clientX+b.clientX)/2,my=(a.clientY+b.clientY)/2;
    const rect=canvas.getBoundingClientRect();
    const cmx=mx-rect.left,cmy=my-rect.top;
    if(lastPinchDist>0){
      const factor=dist/lastPinchDist;
      const old=camera.zoom;
      camera.zoom=Math.max(0.2,Math.min(5,old*factor));
      camera.x=cmx-(cmx-camera.x)*(camera.zoom/old);
      camera.y=cmy-(cmy-camera.y)*(camera.zoom/old);
    }
    camera.x=panTStart.cx+(mx-panTStart.x);
    camera.y=panTStart.cy+(my-panTStart.y);
    lastPinchDist=dist;
    return;
  }

  // Single touch — drag to place/erase
  if(e.touches.length===1&&panTStart){
    const t=e.touches[0];
    const dx=t.clientX-panTStart.x,dy=t.clientY-panTStart.y;
    if(Math.hypot(dx,dy)>8) panTStart.moved=true;
    cursorGrid=screenToGrid(t.clientX,t.clientY);
    if(panTStart.moved){
      if(tool==="place") placeAt(cursorGrid.x,cursorGrid.y);
      if(tool==="erase") eraseAt(cursorGrid.x,cursorGrid.y);
    }
  }
},{passive:false});

canvas.addEventListener("touchend",e=>{
  e.preventDefault();
  // Tap (no move) = single action
  if(panTStart&&!panTStart.moved&&e.touches.length===0){
    const g=cursorGrid;
    if(g){
      if(tool==="place") placeAt(g.x,g.y);
      else if(tool==="erase") eraseAt(g.x,g.y);
      else if(tool==="select") selectAt(g.x,g.y);
    }
  }
  for(const t of e.changedTouches) delete touches[t.identifier];
  if(e.touches.length<2){ panTStart=null; lastPinchDist=0; }
  if(e.touches.length===0){ cursorGrid=null; }
},{passive:false});

// ── Keyboard ───────────────────────────────────────────────────────────────────
window.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  if(e.key==="Delete"||e.key==="Backspace") deleteSelected();
  if(e.key==="Escape"){selectedId=null;closePropPanel();}
  if(e.ctrlKey&&e.key==="z"){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==="y"){e.preventDefault();redo();}
  if(e.key==="p"||e.key==="P") setTool("place");
  if(e.key==="e"||e.key==="E") setTool("erase");
  if(e.key==="s"||e.key==="S") setTool("select");
  if(e.key==="g"||e.key==="G") toggleGrid();
  if(e.key==="="||e.key==="+") zoomBy(1.15);
  if(e.key==="-") zoomBy(0.87);
});

// ── Init ───────────────────────────────────────────────────────────────────────
buildDrawer();
updateInfo();
drawFrame();
</script>
</body>
